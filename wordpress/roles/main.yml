  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Установить базовые утилиты
  apt:
    name:
      - curl
      - git
      - ufw            
      - unzip          
      - python3-pip     
      - python3-pymysql
    state: present
  timezone:
    name: "Europe/Moscow"
  ufw:
    rule: allow
    name: OpenSSH
  ufw:
    state: enabled

