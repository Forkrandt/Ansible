  get_url:
    url: https://wordpress.org
    dest: /tmp/wordpress.tar.gz

  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /tmp
    remote_src: yes
  copy:
    src: /tmp/wordpress/
    dest: /var/www/html/
    remote_src: yes
    owner: www-data
    group: www-data
  template:
    src: wp-config.php.j2
    dest: /var/www/html/wp-config.php
    owner: www-data
    group: www-data
    mode: '0644'
  file:
    path: /var/www/html/index.html
    state: absent

